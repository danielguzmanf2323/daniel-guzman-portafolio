
name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Angular
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar aplicación Angular
        run: npm run build -- --configuration production --base-href=/daniel-guzman-portafolio/

      - name: Preparar archivos para GitHub Pages
        shell: bash
        run: |
          BUILD_DIR=$(dirname "$(find dist -type f -name index.html -print -quit)")

          if [ -z "$BUILD_DIR" ]; then
            echo "No se encontró el archivo index.html generado."
            exit 1
          fi

          echo "Carpeta compilada encontrada: $BUILD_DIR"

          mkdir -p dist-pages
          cp -r "$BUILD_DIR"/. dist-pages/

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir archivos compilados
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist-pages

  deploy:
    name: Deploy GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Publicar sitio
        id: deployment
        uses: actions/deploy-pages@v4

